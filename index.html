<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><style>body{background:linear-gradient(#1a1a2e,#0f3460);height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;font-family:sans-serif;margin:0}.f{position:absolute;top:-10px;color:#fff;animation:f linear infinite;opacity:0.8}@keyframes f{to{transform:translateY(100vh) rotate(360deg)}}.m{text-align:center;animation:i 2s}@keyframes i{from{opacity:0}to{opacity:1}}h1{color:#ff6b9d;font-size:2.3em;text-shadow:0 0 10px #ff6b9d;margin-bottom:15px;animation:p 2s infinite}@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}p{color:#ffeaa7;font-size:1.7em;text-shadow:0 0 5px #ffeaa7}</style></head><body><div class='m'><h1>❄️ Tuyết Yêu Thương ❄️</h1><p>💕 Em làm người yêu anh nha 💕</p></div><script>function c(){const e=document.createElement('div');e.className='f';e.innerHTML='❄';e.style.left=Math.random()*100+'vw';e.style.animationDuration=Math.random()*3+2+'s';e.style.fontSize=Math.random()*15+10+'px';document.body.appendChild(e);setTimeout(()=>{e.remove()},5000)}setInterval(c,150);for(let i=0;i<20;i++)setTimeout(c,i*50);</script></body></html>
